<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tre'Von K. | Data Analytics</title>
    
    <style>
        /* CSS VARIABLES: These store your theme colors in one place for easy updates */
        :root {
            --primary-navy: #1a3a5a;   /* Deep blue sampled from the photo horizon */
            --accent-gold: #d4af37;    /* Gold/Tan sampled from the castle stone */
            --stone-grey: #f4f4f9;     /* Light background color to reduce eye strain */
            --text-main: #2c3e50;      /* Dark slate color for readable text */
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--stone-grey);
            color: var(--text-main);
        }

        /* NAVIGATION: Fixed to the top so it stays visible while scrolling */
        nav {
            background: var(--primary-navy);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 0 25px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-gold);
        }

        /* HERO SECTION: This creates the large image area at the top */
        .hero {
            height: 75vh; /* Sets height to 75% of the screen height */
            /* linear-gradient creates a dark "tint" so the white text is readable over the clouds */
            background: linear-gradient(rgba(26, 58, 90, 0.3), rgba(26, 58, 90, 0.5)), 
                        url('castle-bg.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            border-bottom: 6px solid var(--primary-navy);
        }

        .hero h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
        }

        /* MAIN CONTAINER: The white box that floats over the hero image */
        .container {
            max-width: 1000px;
            margin: -80px auto 50px; /* The negative margin creates the "overlap" effect */
            background: white;
            padding: 60px;
            border-radius: 4px; /* Sharp corners to match the professional castle theme */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--primary-navy);
            border-bottom: 2px solid var(--accent-gold);
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 30px;
        }

        /* CARD STYLE: Used for individual skill or project blocks */
        .card {
            border: 1px solid #eee;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-navy); /* High-contrast accent line */
            transition: 0.3s;
        }

        .card:hover {
            border-left-color: var(--accent-gold); /* Changes from blue to gold on hover */
            transform: translateX(10px); /* Subtle slide effect */
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Overview</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html">Resume</a>
    </nav>

    <section class="hero">
        <h1>Tre'Von Kopping</h1>
        <p style="letter-spacing: 5px; font-weight: bold;">Data Analyst</p>
    </section>

    <div class="container">
        <h2>Overview</h2>
        <p>Haven't filled this out yet, but I'm thinking of an overview description of my portfolio.</p>
        
        <div class="card">
            <h3>Main Skils</h3>
            <p>Leaving space here to add to skills</p>
        </div>
    </div>

</body>
</html>
