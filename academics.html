<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academics | IT Data Analytics</title>
    <style>
        /* THEME VARIABLES - EXACT MATCH TO OTHER PAGES */
        :root {
            --primary-navy: #1a3a5a;   
            --accent-gold: #d4af37;    
            --stone-grey: #f4f4f9;     
            --text-main: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--stone-grey);
            color: var(--text-main);
        }

        nav {
            background: var(--primary-navy);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 0 25px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover { color: var(--accent-gold); }

        .hero {
            height: 75vh; 
            background: linear-gradient(rgba(26, 58, 90, 0.3), rgba(26, 58, 90, 0.5)), 
                        url('castle-bg.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            border-bottom: 6px solid var(--primary-navy);
        }

        .hero h1 {
            font-size: 4rem;
            letter-spacing: 4px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .container {
            max-width: 1000px;
            margin: -80px auto 50px; 
            background: white;
            padding: 60px;
            border-radius: 4px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* COURSE JOURNEY HEADER */
        .journey-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .journey-header h2 {
            color: var(--primary-navy);
            border-bottom: 2px solid var(--accent-gold);
            display: inline-block;
            padding-bottom: 5px;
            font-size: 2rem;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* CLASS CATEGORY CARDS */
        .category-column {
            background: #fff;
            border: 1px solid #eee;
            padding: 20px;
            border-top: 4px solid var(--primary-navy);
        }

        .category-column h3 {
            color: var(--primary-navy);
            font-size: 1.1rem;
            text-transform: uppercase;
            margin-top: 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        /* CLASS LINKS */
        .class-link {
            display: block;
            color: var(--text-main);
            text-decoration: none;
            padding: 8px 0;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .class-link:hover {
            color: var(--accent-gold);
            padding-left: 5px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Overview</a>
        <a href="projects.html">Projects</a>
        <a href="academics.html">Academics</a>
        <a href="resume.html">Resume</a>
    </nav>

    <section class="hero">
        <h1>ACADEMICS</h1>
    </section>

    <div class="container">
        <div class="journey-header">
            <h2>Course Journey</h2>
        </div>

        <div class="category-grid">
            <div class="category-column">
                <h3>Programming</h3>
                <a href="classes/python.html" class="class-link">Python Programming</a>
                <a href="classes/sql-dev.html" class="class-link">SQL Development</a>
            </div>

            <div class="category-column">
                <h3>Data</h3>
                <a href="classes/data-analytics.html" class="class-link">Intro to Data Analytics</a>
                <a href="classes/stats.html" class="class-link">Business Statistics</a>
            </div>

            <div class="category-column">
                <h3>Reporting</h3>
                <a href="classes/power-bi.html" class="class-link">Data Visualization</a>
                <a href="classes/reporting-services.html" class="class-link">Enterprise Reporting</a>
            </div>

            <div class="category-column">
                <h3>Business</h3>
                <a href="classes/project-mgmt.html" class="class-link">Project Management</a>
                <a href="classes/systems-analysis.html" class="class-link">Systems Analysis</a>
            </div>
        </div>
    </div>

</body>
</html>
