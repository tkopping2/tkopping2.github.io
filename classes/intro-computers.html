<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro to Computers & Programming | Academics</title>
    <style>
        :root {
            --primary-navy: #1a3a5a;   
            --accent-gold: #d4af37;    
            --stone-grey: #f4f4f9;     
            --text-main: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--stone-grey);
            color: var(--text-main);
            line-height: 1.8;
        }

        nav {
            background: var(--primary-navy);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 0 25px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover { color: var(--accent-gold); }

        .hero {
            height: 40vh;
            background: linear-gradient(rgba(26, 58, 90, 0.4), rgba(26, 58, 90, 0.6)), 
                        url('../castle-bg.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            border-bottom: 6px solid var(--primary-navy);
        }

        .hero h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            text-transform: uppercase;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: -50px auto 50px; 
            background: white;
            padding: 50px;
            border-radius: 4px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--primary-navy);
            border-bottom: 2px solid var(--accent-gold);
            display: inline-block;
            padding-bottom: 5px;
            margin-top: 40px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 1.3rem;
        }

        h3 {
            color: var(--primary-navy);
            font-size: 1.1rem;
            margin-top: 25px;
        }

        /* Standardized for single images */
        .artifact-img {
            width: 100%;
            height: auto;
            margin: 20px auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: block;
        }

        /* Side by side images centered and larger */
        .image-row {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            justify-content: center; 
        }

        .image-row img {
            width: 45%; 
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            object-fit: contain;
        }

        ul { padding-left: 20px; }
        li { margin-bottom: 10px; }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--primary-navy);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--primary-navy);
            padding: 10px 20px;
            transition: 0.3s;
        }

        .back-link:hover {
            background: var(--primary-navy);
            color: white;
        }
