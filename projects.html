<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Data Analytics</title>
    
    <style>
        /* Same color variables to match main page */
        :root {
            --primary-navy: #1a3a5a;   
            --accent-gold: #d4af37;    
            --stone-grey: #f4f4f9;     
            --text-main: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--stone-grey);
            color: var(--text-main);
        }

        /* This matched the main page to stay consistent */
        nav {
            background: var(--primary-navy);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 0 25px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: var(--accent-gold);
        }

        .hero {
            height: 75vh; 
            background: linear-gradient(rgba(26, 58, 90, 0.3), rgba(26, 58, 90, 0.5)), 
                        url('castle-bg.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            border-bottom: 6px solid var(--primary-navy);
        }

        .hero h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .container {
            max-width: 1000px;
            margin: -80px auto 50px; 
            background: white;
            padding: 60px;
            border-radius: 4px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--primary-navy);
            border-bottom: 2px solid var(--accent-gold);
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 30px;
        }

        .project-card {
            border: 1px solid #eee;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-navy); 
            transition: 0.3s;
        }

        .project-card:hover {
            border-left-color: var(--accent-gold);
            transform: translateX(10px);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Overview</a>
        <a href="projects.html">Projects</a>
        <a href="resume.html">Resume</a>
    </nav>

    <section class="hero">
        <h1>Projeccts</h1>
    </section>

    <div class="container">
        
        <div class="project-card">
            <h3>Powersports Inventory & Maintenance Tracker</h3>
            <p>I'll put a detailed description of this project.</p>
        </div>

        <h2> There will be more projects below. This is just to show the layout so far.</h2>
    </div>

</body>
</html>
